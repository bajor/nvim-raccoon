name: Changelog Check

on:
  pull_request:
    branches: [source]

jobs:
  changelog:
    name: CHANGELOG.md updated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect whether publish surface changed
        id: publish_surface
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 <<'PY'
          import os
          import subprocess
          from pathlib import Path

          allowlist = []
          for raw_line in Path(".github/publish-allowlist.txt").read_text(encoding="utf-8").splitlines():
              entry = raw_line.strip()
              if not entry or entry.startswith("#"):
                  continue
              allowlist.append(entry)

          result = subprocess.run(
              ["git", "diff", "--name-only", os.environ["BASE_SHA"], os.environ["HEAD_SHA"]],
              capture_output=True,
              text=True,
              check=True,
          )
          changed_files = [line for line in result.stdout.splitlines() if line]

          def is_publish_path(path: str) -> bool:
              return any(path == entry or path.startswith(f"{entry}/") for entry in allowlist)

          publish_files = [path for path in changed_files if is_publish_path(path)]
          changed = bool(publish_files)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"changed={'true' if changed else 'false'}\n")

          if changed:
              print("Publish-surface paths changed:")
              for path in publish_files:
                  print(path)
          else:
              print("Only source-only paths changed; skipping changelog requirement.")
          PY

      - name: Check CHANGELOG.md was modified
        if: steps.publish_surface.outputs.changed == 'true'
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$base" "$head" | grep -q '^CHANGELOG\.md$'; then
            echo "CHANGELOG.md was modified."
          else
            echo "::error::CHANGELOG.md was not modified in this PR. Every PR must include a changelog entry."
            exit 1
          fi
