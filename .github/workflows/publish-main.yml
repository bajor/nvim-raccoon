name: Publish Main

on:
  push:
    branches: [source]

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: publish-main
  cancel-in-progress: true

jobs:
  publish:
    name: Publish main branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build stripped publish tree
        run: python3 -m scripts.publish_main build --output "${{ runner.temp }}/publish-tree"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update publish/main branch
        run: |
          set -euo pipefail
          git fetch origin main source
          git fetch origin publish/main || true

          publish_worktree="${{ runner.temp }}/publish-main-worktree"
          git worktree add --force -B publish/main "$publish_worktree" origin/main
          find "$publish_worktree" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R "${{ runner.temp }}/publish-tree"/. "$publish_worktree"/

          cd "$publish_worktree"
          git add --all
          if git diff --cached --quiet; then
            echo "publish/main already matches the current stripped source tree."
          else
            git commit -m "chore: publish source to main"
            git push origin HEAD:publish/main --force-with-lease
          fi

      - name: Create or refresh publish PR
        id: publish_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch origin main
          git fetch origin publish/main || true

          pr_number="$(gh pr list --base main --head publish/main --state open --json number --jq '.[0].number')"

          if ! git show-ref --verify --quiet refs/remotes/origin/publish/main; then
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet origin/main..origin/publish/main; then
            if [ -n "$pr_number" ]; then
              gh pr close "$pr_number" --delete-branch=false --comment "Closing stale publish PR because main already matches the stripped source tree."
            fi
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cat > /tmp/publish-pr-body.md <<EOF
          Generated from \`source\` after merge commit \`${GITHUB_SHA}\`.

          This PR updates \`main\` with the allowlisted install and documentation tree. If publish fails, \`source\` can temporarily be ahead of \`main\` until the publish workflow is rerun or fixed.
          EOF

          if [ -z "$pr_number" ]; then
            gh pr create \
              --base main \
              --head publish/main \
              --title "chore: publish source to main" \
              --body-file /tmp/publish-pr-body.md
            pr_number="$(gh pr list --base main --head publish/main --state open --json number --jq '.[0].number')"
          else
            gh pr edit "$pr_number" \
              --title "chore: publish source to main" \
              --body-file /tmp/publish-pr-body.md
          fi

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Dispatch main validation workflows
        if: steps.publish_pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run main-guard.yml --ref publish/main
          gh workflow run main-ci.yml --ref publish/main

      - name: Enable publish PR auto-merge
        if: steps.publish_pr.outputs.pr_number != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge --auto --squash "${{ steps.publish_pr.outputs.pr_number }}"
